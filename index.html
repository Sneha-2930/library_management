<!DOCTYPE html>
<html>
<head>
    <title>Library Management</title>

    <style>
        body {
            text-align: center;
            background: #1e3a8a;
            color: white;
            font-family: Arial, sans-serif;
        }

        form {
            background: #2c3e50;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>

</head>

<body>

<h1>Library Management</h1>
<h4>Welcome To The Online Portal</h4>

<form action="dashboard.html" method="GET">

    <label>Name</label><br>
    <input type="text" name="name" placeholder="Enter your name" required><br><br>

    <label>Section</label><br>
    <input type="text" name="section" placeholder="Enter your section" required><br><br>

    <label>Roll No</label><br>
    <input type="text" name="roll" placeholder="Enter your roll number" required><br><br>

    <button type="submit">Enter</button>

</form>

</body>
</html>

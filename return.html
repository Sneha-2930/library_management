<!DOCTYPE html>
<html>
<head>
    <title>Return Book</title>
<style>
body{
text-align:center;
background: #1e3a8a;
}
  form{
            background-color: #2c3e50;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            color: white;
        }

        input, textarea{
            width: 90%;
            padding: 8px;
            margin-top: 5px;
        }

        button{
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;

</style>
</head>
<body>

<h2>Return Book</h2>

<form>
    <label>Book ID</label><br>
    <input type="text" required><br><br>

    <label>Book Issued Date</label><br>
    <input type="date" required><br><br>

    <button type="submit">Submit</button>
</form>

<p>
📚 Please return the book to library between <b>10 AM – 4 PM</b>
</p>

</body>
</html>
